server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: helloworld
    static_configs:
      - targets:
          - localhost
        labels:
          job: helloworld
          __path__: /var/log/helloworld.logs
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            rid: rid
            version: version
      - labels:
          level:
          msg:
          version:
      - timestamp:
          source: time
          format: RFC3339Nano
