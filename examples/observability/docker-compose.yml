# Grafana (UI), Prometheus (metrics, internal), Tempo (traces via OTLP).
# Day-to-day: open only Grafana — http://localhost:3000
#
# Run from repo root:
#   docker compose -f examples/observability/docker-compose.yml up -d
#
# Point helloworld at OTLP on localhost:4317 (see README).

services:
  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      # OTLP for apps on the host (HELLOWORLD_OTEL_EXPORTER_OTLP_ENDPOINT=127.0.0.1:4317)
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # No host port: scrape targets only; Grafana reaches Prometheus on the Docker network.

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - tempo
