name: CI

on:
  pull_request:
    branches: ['*']
  push:
    branches: ['*']

jobs:
  check-version:
    name: Check VERSION file changed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to compare changes
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check if VERSION file was changed
        id: check_version
        run: |
          set +e  # Don't exit on error for grep
          # For pull requests, compare against the base branch (master or main)
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            
            # Fetch all branches to ensure we have the base branch
            git fetch origin --depth=1
            
            # Determine the base branch SHA - use the base branch from the PR, or fallback to master/main
            BASE_SHA="origin/$BASE_BRANCH"
            
            # If the PR's base branch doesn't exist, try master then main
            if ! git rev-parse --verify "$BASE_SHA" >/dev/null 2>&1; then
              if git rev-parse --verify "origin/master" >/dev/null 2>&1; then
                BASE_SHA="origin/master"
                echo "Using origin/master as base branch"
              elif git rev-parse --verify "origin/main" >/dev/null 2>&1; then
                BASE_SHA="origin/main"
                echo "Using origin/main as base branch"
              else
                echo "::error::Could not find base branch (master or main)"
                exit 1
              fi
            else
              echo "Using origin/$BASE_BRANCH as base branch"
            fi
            
            # Get the actual commit SHA for the base branch
            BASE_COMMIT=$(git rev-parse "$BASE_SHA")
            HEAD_COMMIT=$(git rev-parse "$HEAD_SHA")
            
            echo "BASE_BRANCH: $BASE_BRANCH"
            echo "BASE_SHA ref: $BASE_SHA"
            echo "BASE_COMMIT: $BASE_COMMIT"
            echo "HEAD_SHA: $HEAD_SHA"
            echo "HEAD_COMMIT: $HEAD_COMMIT"
            echo "Current HEAD: $(git rev-parse HEAD)"
            echo ""
            echo "Changed files between $BASE_COMMIT and $HEAD_COMMIT:"
            git diff --name-only "$BASE_COMMIT" "$HEAD_COMMIT" || true
            echo ""
            
            # Use the commit SHAs for comparison
            BASE_SHA="$BASE_COMMIT"
            HEAD_SHA="$HEAD_COMMIT"
          else
            # For pushes, compare against the previous commit
            # If before is empty (first commit), compare against HEAD~1 or allow if it's the initial commit
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.event.after }}"
            
            # If before is empty, try to get the parent commit
            if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]; then
              # Check if this is the initial commit (no parent)
              if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
                BASE_SHA="HEAD~1"
              else
                # This is the initial commit, allow it (VERSION file should exist)
                if [ -f "VERSION" ]; then
                  echo "changed=true" >> $GITHUB_OUTPUT
                  echo "✅ Initial commit with VERSION file"
                  exit 0
                else
                  echo "changed=false" >> $GITHUB_OUTPUT
                  echo "❌ VERSION file missing in initial commit"
                  exit 1
                fi
              fi
            fi
          fi
          
          # Check if VERSION file is in the list of changed files
          # Use two-dot notation for simplicity and reliability
          set +e  # Don't exit on error, we'll check the exit code
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>&1)
          DIFF_EXIT_CODE=$?
          set -e  # Re-enable exit on error
          
          if [ $DIFF_EXIT_CODE -ne 0 ]; then
            echo "::error::git diff failed with exit code $DIFF_EXIT_CODE"
            echo "BASE_SHA: $BASE_SHA"
            echo "HEAD_SHA: $HEAD_SHA"
            echo "Error output: $CHANGED_FILES"
            exit 1
          fi
          
          echo "Changed files between $BASE_SHA and $HEAD_SHA:"
          echo "$CHANGED_FILES"
          
          # Check if VERSION is in the changed files (exact match on whole line)
          set +e  # Don't exit on error for grep
          echo "$CHANGED_FILES" | grep -q "^VERSION$"
          VERSION_FOUND=$?
          set -e  # Re-enable exit on error
          
          if [ $VERSION_FOUND -eq 0 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ VERSION file has been updated"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "❌ VERSION file has NOT been updated"
            echo "Looking for VERSION in changed files..."
            set +e
            echo "$CHANGED_FILES" | grep -i version || echo "No VERSION found in changed files"
            set -e
          fi

      - name: Fail if VERSION not changed
        if: steps.check_version.outputs.changed != 'true'
        run: |
          echo "::error::VERSION file must be updated in every commit/PR. Please update the VERSION file and try again."
          exit 1

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        run: go test ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Read VERSION
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          go build -ldflags="-X 'main.Version=${{ steps.version.outputs.VERSION }}'" -o bin/helloworld ./cmd/helloworld
