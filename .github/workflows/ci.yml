name: CI

on:
  pull_request:
    branches: ['*']
  push:
    branches: ['*']

jobs:
  check-version:
    name: Check VERSION file changed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if VERSION file was changed
        run: |
          git fetch origin master 2>/dev/null || git fetch origin main 2>/dev/null
          
          BASE_BRANCH=$(git rev-parse --verify origin/master 2>/dev/null && echo "master" || echo "main")
          BASE_VERSION=$(git show "origin/$BASE_BRANCH:VERSION" 2>/dev/null || echo "")
          CURRENT_VERSION=$(cat VERSION 2>/dev/null || echo "")
          
          if [ "$BASE_VERSION" = "$CURRENT_VERSION" ]; then
            echo "::error::VERSION file must be updated in every commit/PR. Please update the VERSION file and try again."
            exit 1
          else
            echo "✅ VERSION file has been updated"
          fi

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        run: go test ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Read VERSION
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          go build -ldflags="-X 'main.Version=${{ steps.version.outputs.VERSION }}'" -o bin/helloworld ./cmd/helloworld
