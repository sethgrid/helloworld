name: CI

on:
  pull_request:
    branches: ['*']
  push:
    branches: ['*']

jobs:
  check-version:
    name: Check VERSION file changed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if VERSION file was changed
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            HEAD_REF="${{ github.event.pull_request.head.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
            HEAD_REF="${{ github.event.after }}"
          fi
          
          git fetch origin "$BASE_REF" 2>/dev/null || git fetch origin master 2>/dev/null || git fetch origin main 2>/dev/null
          BASE_COMMIT=$(git rev-parse "origin/$BASE_REF" 2>/dev/null || git rev-parse "origin/master" 2>/dev/null || git rev-parse "origin/main" 2>/dev/null || echo "$BASE_REF")
          
          CHANGED=$(git diff --name-only "$BASE_COMMIT" "$HEAD_REF" | grep -Fx "VERSION" || echo "")
          
          if [ -n "$CHANGED" ]; then
            echo "✅ VERSION file has been updated"
          else
            echo "::error::VERSION file must be updated in every commit/PR. Please update the VERSION file and try again."
            exit 1
          fi

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        run: go test ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Read VERSION
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          go build -ldflags="-X 'main.Version=${{ steps.version.outputs.VERSION }}'" -o bin/helloworld ./cmd/helloworld
